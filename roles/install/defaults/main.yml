---
# Default variables for YugabyteDB installation

yugabytedb_version: "2.40.2.0"
yugabytedb_data_dir: "/var/lib/yugabyte"
yugabytedb_log_dir: "/var/log/yugabyte"
yugabytedb_install_dir: "/opt/yugabyte"
yugabytedb_user: "yugabyte"
yugabytedb_group: "yugabyte"

# Network settings
yugabytedb_master_ports: "7100"
yugabytedb_tserver_ports: "9100"
yugabytedb_ui_ports: "7000,9000"

# Cloud provider (auto, aws, gcp, azure, onprem)
yugabytedb_cloud_provider: "onprem"

# Replication factor
yugabytedb_replication_factor: 3

# Additional configuration options
yugabytedb_enable_ysql: true
yugabytedb_enable_ycql: true

# System requirements
yugabytedb_disable_thp: true
yugabytedb_disable_swap: false
yugabytedb_set_ulimits: true
