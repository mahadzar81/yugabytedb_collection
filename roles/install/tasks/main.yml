---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
        - "default.yml"
      paths:
        - "{{ role_path }}/vars"

- name: Validate supported OS
  ansible.builtin.fail:
    msg: "Unsupported operating system: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
  when:
    - not (
        (ansible_distribution == 'RedHat' and ansible_distribution_major_version is version('8', '>=') and ansible_distribution_major_version is version('10', '<=')) or
        (ansible_distribution == 'Rocky' and ansible_distribution_major_version is version('8', '>=') and ansible_distribution_major_version is version('10', '<=')) or
        (ansible_distribution == 'AlmaLinux' and ansible_distribution_major_version is version('8', '>=') and ansible_distribution_major_version is version('10', '<=')) or
        (ansible_distribution == 'Debian' and ansible_distribution_major_version is version('11', '>=') and ansible_distribution_major_version is version('13', '<=')) or
        (ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('22.04', '>=') and ansible_distribution_version is version('24.04', '<='))
      )

- name: Install prerequisites for RHEL-based systems
  when: ansible_os_family == "RedHat"
  block:
    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - wget
          - curl
          - tar
          - gzip
          - libaio
          - numactl
          - sysstat
          - net-tools
          - bind-utils
        state: present
        update_cache: true

    - name: Install Python dependencies
      ansible.builtin.package:
        name:
          - python3-libselinux
          - python3-policycoreutils
        state: present
      failed_when: false

- name: Install prerequisites for Debian-based systems
  when: ansible_os_family == "Debian"
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - wget
          - curl
          - tar
          - gzip
          - libaio1
          - numactl
          - sysstat
          - net-tools
          - dnsutils
          - apt-transport-https
          - ca-certificates
          - gnupg
        state: present

- name: Create YugabyteDB group
  ansible.builtin.group:
    name: "{{ yugabytedb_group }}"
    state: present
    system: true

- name: Create YugabyteDB user
  ansible.builtin.user:
    name: "{{ yugabytedb_user }}"
    group: "{{ yugabytedb_group }}"
    shell: /bin/bash
    system: true
    create_home: false
    comment: "YugabyteDB Service User"

- name: Create installation directory
  ansible.builtin.file:
    path: "{{ yugabytedb_install_dir }}"
    state: directory
    owner: "{{ yugabytedb_user }}"
    group: "{{ yugabytedb_group }}"
    mode: "0755"

- name: Create data directory
  ansible.builtin.file:
    path: "{{ yugabytedb_data_dir }}"
    state: directory
    owner: "{{ yugabytedb_user }}"
    group: "{{ yugabytedb_group }}"
    mode: "0755"

- name: Create log directory
  ansible.builtin.file:
    path: "{{ yugabytedb_log_dir }}"
    state: directory
    owner: "{{ yugabytedb_user }}"
    group: "{{ yugabytedb_group }}"
    mode: "0755"

- name: Determine download URL
  ansible.builtin.set_fact:
    yugabytedb_download_url: >-
      https://downloads.yugabyte.com/releases/{{ yugabytedb_version }}/yugabyte-{{ yugabytedb_version }}-{{ 
      'el8' if ansible_os_family == 'RedHat' else 
      'bionic' if ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('22.04', '==') else
      'focal' if ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('24.04', '==') else
      'bullseye' if ansible_distribution == 'Debian' and ansible_distribution_major_version == '11' else
      'bookworm' if ansible_distribution == 'Debian' and ansible_distribution_major_version == '12' else
      'trixie' if ansible_distribution == 'Debian' and ansible_distribution_major_version == '13' else
      'el8' 
      }}.x86_64.tar.gz

- name: Download YugabyteDB
  ansible.builtin.get_url:
    url: "{{ yugabytedb_download_url }}"
    dest: "/tmp/yugabyte-{{ yugabytedb_version }}.tar.gz"
    mode: "0644"
  register: download_result
  retries: 3
  delay: 10
  until: download_result is succeeded

- name: Extract YugabyteDB
  ansible.builtin.unarchive:
    src: "/tmp/yugabyte-{{ yugabytedb_version }}.tar.gz"
    dest: "{{ yugabytedb_install_dir }}"
    remote_src: true
    creates: "{{ yugabytedb_install_dir }}/yugabyte-{{ yugabytedb_version }}"

- name: Create symlink to current version
  ansible.builtin.file:
    src: "{{ yugabytedb_install_dir }}/yugabyte-{{ yugabytedb_version }}"
    dest: "{{ yugabytedb_install_dir }}/current"
    state: link
    force: true

- name: Set ownership on installation directory
  ansible.builtin.file:
    path: "{{ yugabytedb_install_dir }}"
    state: directory
    owner: "{{ yugabytedb_user }}"
    group: "{{ yugabytedb_group }}"
    recurse: true
    mode: "0755"

- name: Configure ulimits for YugabyteDB user
  when: yugabytedb_set_ulimits
  ansible.builtin.lineinfile:
    path: /etc/security/limits.d/yugabyte.conf
    line: "{{ item }}"
    create: true
    mode: "0644"
  loop:
    - "yugabyte soft nofile 200000"
    - "yugabyte hard nofile 200000"
    - "yugabyte soft nproc 200000"
    - "yugabyte hard nproc 200000"
    - "yugabyte soft core unlimited"
    - "yugabyte hard core unlimited"

- name: Disable Transparent Huge Pages (THP)
  when: yugabytedb_disable_thp
  block:
    - name: Disable THP at runtime
      ansible.builtin.shell: |
        if [ -d /sys/kernel/mm/transparent_hugepage ]; then
          echo never > /sys/kernel/mm/transparent_hugepage/enabled
          echo never > /sys/kernel/mm/transparent_hugepage/defrag
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Create THP disable systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/disable-thp.service
        mode: "0644"
        content: |
          [Unit]
          Description=Disable Transparent Huge Pages
          DefaultDependencies=no
          After=sysinit.target local-fs.target
          Before=basic.target

          [Service]
          Type=oneshot
          ExecStart=/bin/bash -c 'echo never > /sys/kernel/mm/transparent_hugepage/enabled && echo never > /sys/kernel/mm/transparent_hugepage/defrag'

          [Install]
          WantedBy=basic.target

    - name: Enable THP disable service
      ansible.builtin.systemd:
        name: disable-thp
        enabled: true
        daemon_reload: true
      failed_when: false

- name: Disable swap (optional)
  when: yugabytedb_disable_swap
  ansible.builtin.command: swapoff -a
  changed_when: false
  failed_when: false

- name: Configure kernel parameters for YugabyteDB
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { name: 'vm.swappiness', value: '1' }
    - { name: 'vm.overcommit_memory', value: '1' }
    - { name: 'net.core.somaxconn', value: '4096' }
    - { name: 'net.ipv4.tcp_max_syn_backlog', value: '8192' }
  failed_when: false

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: "/tmp/yugabyte-{{ yugabytedb_version }}.tar.gz"
    state: absent
