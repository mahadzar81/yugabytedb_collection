---
# Default variables for configure role

yugabytedb_replication_factor: 3
yugabytedb_enable_ysql: true
yugabytedb_enable_ycql: true
yugabytedb_cloud_provider: "onprem"

# Memory settings (adjust based on your hardware)
yugabytedb_memory_limit_mb: 4096

# Network timeouts
yugabytedb_rpc_timeout_ms: 30000
yugabytedb_heartbeat_interval_ms: 1000

# Logging settings
yugabytedb_log_level: "INFO"
yugabytedb_log_max_size_mb: 1024
yugabytedb_log_max_files: 10
