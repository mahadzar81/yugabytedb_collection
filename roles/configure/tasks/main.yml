---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
        - "default.yml"
      paths:
        - "{{ role_path }}/vars"

- name: Set facts for cluster nodes
  ansible.builtin.set_fact:
    yugabytedb_master_nodes: "{{ groups['yugabytedb_masters'] | default(groups['yugabytedb_nodes'], true) }}"
    yugabytedb_tserver_nodes: "{{ groups['yugabytedb_tservers'] | default(groups['yugabytedb_nodes'], true) }}"

- name: Generate master gflags configuration
  ansible.builtin.template:
    src: master_gflags.conf.j2
    dest: "{{ yugabytedb_install_dir }}/current/conf/master_gflags.conf"
    owner: "{{ yugabytedb_user }}"
    group: "{{ yugabytedb_group }}"
    mode: "0644"
  notify: Restart YugabyteDB Masters

- name: Generate tserver gflags configuration
  ansible.builtin.template:
    src: tserver_gflags.conf.j2
    dest: "{{ yugabytedb_install_dir }}/current/conf/tserver_gflags.conf"
    owner: "{{ yugabytedb_user }}"
    group: "{{ yugabytedb_group }}"
    mode: "0644"
  notify: Restart YugabyteDB Tservers

- name: Create systemd service for YugabyteDB Masters
  ansible.builtin.template:
    src: yugabytedb-master.service.j2
    dest: /etc/systemd/system/yugabytedb-master.service
    mode: "0644"
  notify: Reload systemd

- name: Create systemd service for YugabyteDB Tservers
  ansible.builtin.template:
    src: yugabytedb-tserver.service.j2
    dest: /etc/systemd/system/yugabytedb-tserver.service
    mode: "0644"
  notify: Reload systemd

- name: Enable and start YugabyteDB services on first master
  when: inventory_hostname == yugabytedb_master_nodes[0]
  block:
    - name: Initialize YugabyteDB cluster
      ansible.builtin.shell: |
        {{ yugabytedb_install_dir }}/current/bin/yugabyted start \
          --background=false \
          --master_flags="--fs_data_dirs={{ yugabytedb_data_dir }}/master" \
          --tserver_flags="--fs_data_dirs={{ yugabytedb_data_dir }}/tserver" \
          --ysql_enable=true \
          --ycql_enable=true
      args:
        creates: "{{ yugabytedb_data_dir }}/master/meta"
      become: true
      become_user: "{{ yugabytedb_user }}"
      register: init_result
      changed_when: "'Starting' in init_result.stdout or init_result.rc == 0"

- name: Wait for first master to be ready
  when: inventory_hostname == yugabytedb_master_nodes[0]
  ansible.builtin.wait_for:
    port: "{{ yugabytedb_master_ports | int }}"
    host: "{{ ansible_default_ipv4.address | default(ansible_all_ipv4_addresses[0]) }}"
    timeout: 300
    delay: 10

- name: Join additional masters to cluster
  when: 
    - inventory_hostname in yugabytedb_master_nodes
    - inventory_hostname != yugabytedb_master_nodes[0]
  block:
    - name: Wait for initial master to be available
      ansible.builtin.wait_for:
        port: "{{ yugabytedb_master_ports | int }}"
        host: "{{ hostvars[yugabytedb_master_nodes[0]]['ansible_default_ipv4']['address'] | default(hostvars[yugabytedb_master_nodes[0]]['ansible_all_ipv4_addresses'][0]) }}"
        timeout: 300
        delay: 10

    - name: Start master on additional nodes
      ansible.builtin.shell: |
        {{ yugabytedb_install_dir }}/current/bin/yugabyted start \
          --background=false \
          --master_flags="--fs_data_dirs={{ yugabytedb_data_dir }}/master" \
          --tserver_flags="--fs_data_dirs={{ yugabytedb_data_dir }}/tserver" \
          --join={{ hostvars[yugabytedb_master_nodes[0]]['ansible_default_ipv4']['address'] | default(hostvars[yugabytedb_master_nodes[0]]['ansible_all_ipv4_addresses'][0]) }}
      args:
        creates: "{{ yugabytedb_data_dir }}/master/meta"
      become: true
      become_user: "{{ yugabytedb_user }}"

- name: Start Tservers on all nodes
  when: inventory_hostname in yugabytedb_tserver_nodes
  block:
    - name: Check if TServer is already running
      ansible.builtin.command: pgrep -f yugabyted-tserver
      register: tserver_check
      failed_when: false
      changed_when: false

    - name: Start TServer if not running
      when: tserver_check.rc != 0
      ansible.builtin.shell: |
        {{ yugabytedb_install_dir }}/current/bin/yugabyted start \
          --background=false \
          --tserver_flags="--fs_data_dirs={{ yugabytedb_data_dir }}/tserver" \
          --join={{ hostvars[yugabytedb_master_nodes[0]]['ansible_default_ipv4']['address'] | default(hostvars[yugabytedb_master_nodes[0]]['ansible_all_ipv4_addresses'][0]) }}
      args:
        creates: "{{ yugabytedb_data_dir }}/tserver/data"
      become: true
      become_user: "{{ yugabytedb_user }}"

- name: Configure firewall rules for RHEL-based systems
  when: ansible_os_family == "RedHat"
  block:
    - name: Install firewalld if not present
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Enable firewalld
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Add firewall rules for YugabyteDB
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - "{{ yugabytedb_master_ports }}/tcp"
        - "{{ yugabytedb_tserver_ports }}/tcp"
        - "7000/tcp"
        - "9000/tcp"
        - "5433/tcp"
        - "9042/tcp"
      failed_when: false

- name: Configure firewall rules for Debian-based systems
  when: ansible_os_family == "Debian"
  block:
    - name: Install ufw if not present
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Allow YugabyteDB ports through firewall
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "{{ yugabytedb_master_ports }}"
        - "{{ yugabytedb_tserver_ports }}"
        - "7000"
        - "9000"
        - "5433"
        - "9042"
      failed_when: false

- name: Verify cluster health
  when: inventory_hostname == yugabytedb_master_nodes[0]
  block:
    - name: Wait for cluster to be ready
      ansible.builtin.shell: |
        {{ yugabytedb_install_dir }}/current/bin/yugabyted status
      register: cluster_status
      retries: 30
      delay: 10
      until: "'Running' in cluster_status.stdout"
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        var: cluster_status.stdout_lines
