---
# Molecule configuration for Ubuntu 24.04 (Noble Numbat)
driver:
  name: delegated
  options:
    managed: false
    ansible_connection_options:
      ansible_connection: ssh
      ansible_ssh_user: root
      ansible_python_interpreter: /usr/bin/python3

platforms:
  - name: ubuntu2404
    # Platform identifier for documentation

provisioner:
  name: ansible
  playbooks:
    prepare: ../default/prepare.yml
    converge: ../default/converge.yml
    verify: ../default/verify.yml
  inventory:
    hosts:
      all:
        hosts:
          ubuntu2404:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: ubuntu
            target_os_version: "24.04"

scenario:
  name: ubuntu2404
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
