---
# Molecule configuration for Debian 13 (Trixie)
driver:
  name: delegated
  options:
    managed: false
    ansible_connection_options:
      ansible_connection: ssh
      ansible_ssh_user: root
      ansible_python_interpreter: /usr/bin/python3

platforms:
  - name: debian13
    # Platform identifier for documentation

provisioner:
  name: ansible
  playbooks:
    prepare: ../default/prepare.yml
    converge: ../default/converge.yml
    verify: ../default/verify.yml
  inventory:
    hosts:
      all:
        hosts:
          debian13:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: debian
            target_os_version: "13"

scenario:
  name: debian13
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
