---
# Purpose: bring the instance to the desired state by running the role under test.
# Molecule calls this playbook with `molecule converge`.
- name: Converge
  hosts: all
  gather_facts: true
  tasks:
    - name: Apply install role
      ansible.builtin.include_role:
        name: yugabytedb.yugabytedb.install

    - name: Apply configure role
      ansible.builtin.include_role:
        name: yugabytedb.yugabytedb.configure

    - name: Apply manage role
      ansible.builtin.include_role:
        name: yugabytedb.yugabytedb.manage
