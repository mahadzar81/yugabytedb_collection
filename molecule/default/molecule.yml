# molecule/default/molecule.yml
dependency:
  name: galaxy

driver:
  name: docker   # or podman

platforms:
  - name: yugabyte-rhel9
    image: "registry.access.redhat.com/ubi9/ubi:latest"
    pre_build_image: true
    privileged: true
    command: /sbin/init
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    groups:
      - yugabytedb_nodes

  - name: yugabyte-rhel10
    image: "registry.access.redhat.com/ubi10/ubi:latest"
    pre_build_image: true
    privileged: true
    command: /sbin/init
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    groups:
      - yugabytedb_nodes

  - name: yugabyte-ubuntu2204
    image: "geerlingguy/docker-ubuntu2204-ansible:latest"
    pre_build_image: true
    privileged: true
    command: /sbin/init
    tmpfs:
      - /run
      - /tmp
    groups:
      - yugabytedb_nodes

  - name: yugabyte-ubuntu2404
    image: "geerlingguy/docker-ubuntu2404-ansible:latest"
    pre_build_image: true
    privileged: true
    command: /sbin/init
    tmpfs:
      - /run
      - /tmp
    groups:
      - yugabytedb_nodes

provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp/.ansible/tmp        # ← KEY FIX #1
      remote_user: root
    ssh_connection:
      pipelining: true
  inventory:
    group_vars:
      all:
        ansible_user: root
        ansible_shell_executable: /bin/bash  # ← KEY FIX #2

verifier:
  name: ansible