# Molecule configuration for YugabyteDB Ansible Collection
# Consolidated multi-scenario configuration for multiple OS platforms

driver:
  name: docker

platforms:
  # Test on Rocky Linux 9 (RHEL equivalent)
  - name: yugabyte-rhel9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    published_ports:
      - 0.0.0.0:8080:80/tcp
    # FIX: Force connection as root to bypass sudo password prompts
    user: root
    # Systemd capability requirements
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    command: "/usr/sbin/init"

  # Test on Rocky Linux 10 (RHEL equivalent)
  - name: yugabyte-rhel10
    image: geerlingguy/docker-rockylinux10-ansible:latest
    pre_build_image: true
    published_ports:
      - 0.0.0.0:8082:80/tcp
    user: root
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    command: "/usr/sbin/init"

  # Test on Ubuntu 22.04 (Debian equivalent)
  - name: yugabyte-ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    published_ports:
      - 0.0.0.0:8081:80/tcp
    # Systemd capability requirements
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    command: "/lib/systemd/systemd"

  # Test on Ubuntu 24.04 (Debian equivalent)
  - name: yugabyte-ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    published_ports:
      - 0.0.0.0:8083:80/tcp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    command: "/lib/systemd/systemd"

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  config_options:
    defaults:
      remote_tmp: /tmp/ansible-tmp

scenario:
  name: default
  test_sequence:
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy