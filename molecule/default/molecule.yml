# Molecule configuration for YugabyteDB Ansible Collection
# Consolidated multi-scenario configuration for multiple OS platforms

driver:
  name: docker

platforms:
  - name: default
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: debian11
    image: geerlingguy/docker-debian11-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: debian12
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: rhel8
    image: geerlingguy/docker-rockylinux8-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: rhel9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    hosts:
      all:
        vars:
          ansible_remote_tmp: /tmp
        hosts:
          default:
            ansible_python_interpreter: /usr/bin/python3
          debian11:
            ansible_python_interpreter: /usr/bin/python3
            target_os: debian
            target_os_version: "11"
          debian12:
            ansible_python_interpreter: /usr/bin/python3
            target_os: debian
            target_os_version: "12"
          rhel8:
            ansible_python_interpreter: /usr/bin/python3
            target_os: rhel
            target_os_version: "8"
          rhel9:
            ansible_python_interpreter: /usr/bin/python3
            target_os: rhel
            target_os_version: "9"
          ubuntu2204:
            ansible_python_interpreter: /usr/bin/python3
            target_os: ubuntu
            target_os_version: "22.04"
          ubuntu2404:
            ansible_python_interpreter: /usr/bin/python3
            target_os: ubuntu
            target_os_version: "24.04"

scenario:
  name: default
  test_sequence:
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy