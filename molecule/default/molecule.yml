---
# Molecule configuration for YugabyteDB Ansible Collection
# Consolidated multi-scenario configuration for multiple OS platforms

dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false
    role-file: requirements.yml
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: default
    image: geerlingguy/docker-ubuntu2204-ansible:latest
  - name: debian11
    image: geerlingguy/docker-debian11-ansible:latest
  - name: debian12
    image: geerlingguy/docker-debian12-ansible:latest
  - name: debian13
    image: geerlingguy/docker-debian13-ansible:latest
  - name: rhel8
    image: geerlingguy/docker-rockylinux8-ansible:latest
  - name: rhel9
    image: geerlingguy/docker-rockylinux9-ansible:latest
  - name: rhel10
    image: geerlingguy/docker-rockylinux10-ansible:latest
  - name: ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
  - name: ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    hosts:
      all:
        hosts:
          default:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
          debian11:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: debian
            target_os_version: "11"
          debian12:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: debian
            target_os_version: "12"
          debian13:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: debian
            target_os_version: "13"
          rhel8:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: rhel
            target_os_version: "8"
          rhel9:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: rhel
            target_os_version: "9"
          rhel10:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: rhel
            target_os_version: "10"
          ubuntu2204:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: ubuntu
            target_os_version: "22.04"
          ubuntu2404:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: ubuntu
            target_os_version: "24.04"

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
