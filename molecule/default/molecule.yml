---
# Molecule configuration for YugabyteDB Ansible Collection
# Consolidated multi-scenario configuration for multiple OS platforms

dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: true # Set to true so molecule doesn't crash if requirements.yml is missing

driver:
  name: docker

# Reusable configuration block for systemd support in Docker
x-docker-systemd: &docker_systemd
  command: /lib/systemd/systemd
  volumes:
    - /sys/fs/cgroup:/sys/fs/cgroup:rw
  cgroupns_mode: host
  privileged: true
  pre_build_image: true

platforms:
  - name: default
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    <<: *docker_systemd
  - name: debian11
    image: geerlingguy/docker-debian11-ansible:latest
    <<: *docker_systemd
  - name: debian12
    image: geerlingguy/docker-debian12-ansible:latest
    <<: *docker_systemd
  - name: rhel8
    image: geerlingguy/docker-rockylinux8-ansible:latest
    <<: *docker_systemd
  - name: rhel9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    <<: *docker_systemd
  - name: ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    <<: *docker_systemd
  - name: ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    <<: *docker_systemd

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    hosts:
      all:
        hosts:
          default:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
          debian11:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: debian
            target_os_version: "11"
          debian12:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: debian
            target_os_version: "12"
          rhel8:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: rhel
            target_os_version: "8"
          rhel9:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: rhel
            target_os_version: "9"
          ubuntu2204:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: ubuntu
            target_os_version: "22.04"
          ubuntu2404:
            ansible_host: localhost
            ansible_user: root
            ansible_python_interpreter: /usr/bin/python3
            target_os: ubuntu
            target_os_version: "24.04"

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy